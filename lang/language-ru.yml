shop-setup-desc-selling: |-
  &e  Положите предметы, которые вы хотите продавать, в сундук,
  &e  затем кликните правой кнопкой мыши на торговца в приседе, чтобы изменить стоимость.
shop-setup-desc-buying: |-
  &e  Положите по одному экземпляру каждого предмета, который вы хотите покупать,
  &e  затем кликните правой кнопкой мыши на торговца в приседе, чтобы изменить стоимость.
shop-setup-desc-trading: |-
  &e  Положите предметы, которые вы хотите обменивать, в сундук,
  &e  затем кликните правой кнопкой мыши на торговца в приседе, чтобы изменить стоимость.
shop-setup-desc-book: |-
  &e Поместите написанные и пустые книги в сундук,
  &e  а затем кликните правой кнопкой мыши на торговце в приседе, чтобы изменить стоимость.
shop-setup-desc-admin-regular: |-
  &e Кликните правой кнопкой мыши на торговца в приседе для изменения ассортимента.
trade-setup-desc-header: '&6{shopType}'
trade-setup-desc-admin-regular:
- Имеет неограниченное количество запасов.
- Поместите предметы из вашего инвентаря сюда.
- 'Верхний ряд: Продаваемые предметы'
- 'Нижние ряды: Платящие предметы (цена)'
trade-setup-desc-selling:
- Продает предметы игрокам.
- Поместите предметы для продажи в сундук.
- Лк/ПКМ для корректировки количества/стоимости.
- 'Верхний ряд: Товары, которые продаются'
- 'Нижние ряды: Платящие предметы'
trade-setup-desc-buying:
- Покупает предметы у игроков.
- Поместите по одному экземпляру каждого предмета, который вы хотите купить,
- а также достаточное количество валютных предметов, на которые будете расплачиваться, в сундук.
- Лк/ПКМ для корректировки количества/стоимости.
- 'Верхний ряд: Платящие предметы (цена)'
- 'Нижний ряд: Покупаемые товары'
trade-setup-desc-trading:
- Обменивает предметами с игроками.
- Возьмите предмет из инвентаря и затем кликните по слоту, чтобы поместить его в магазин.
- Лк/ПКМ для корректировки количества/стоимости.
- 'Верхний ряд: Товары, которые продаются'
- 'Нижние ряды: Платящие предметы'
trade-setup-desc-book:
- Продает копии книг.
- Поместите написанные и пустые книги в сундук.
- Лк/ПКМ для корректировки стоимости.
- 'Верхний ряд: Книги, которые продаются'
- 'Нижние ряды: Платящие предметы'
