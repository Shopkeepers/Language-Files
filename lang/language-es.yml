shop-setup-desc-selling: |-
  &e  Añade los items que quieras vender a tu contenedor, luego
  &e  haz clic derecho en la tienda mientras te agachas para modificar los costos.
shop-setup-desc-buying: |-
  &e  Añade uno de cada item que quieras comprar a tu contenedor,
  &e  luego haz clic derecho en la tienda mientras te agachas para modificar los costos.
shop-setup-desc-trading: |-
  &e  Añade los items que quieras vender a tu contenedor, luego
  &e  haz clic derecho en la tienda mientras te agachas para modificar los costos.
shop-setup-desc-book: |-
  &e  Añade libros escritos y en blanco a tu contenedor, luego
  &e  haz clic derecho en la tienda mientras te agachas para modificar los costos.
shop-setup-desc-admin-regular: |-
  &e  Haz clic derecho en la tienda mientras te agachas para modificar los intercambios.

trade-setup-desc-header: '&6{shopType}'
trade-setup-desc-admin-regular:
- Tiene stock ilimitado.
- Inserta items desde tu inventario.
- 'Fila superior: Items de resultado'
- 'Filas inferiores: Items de costo'
trade-setup-desc-selling:
- Vende items a los jugadores.
- Inserta los items a vender en el contenedor.
- Clic izquierdo/derecho para ajustar cantidades.
- 'Fila superior: Items en venta'
- 'Filas inferiores: Items de costo'
trade-setup-desc-buying:
- Compra items de los jugadores.
- Inserta uno de cada item que quieras
- comprar y mucha moneda
- en el contenedor.
- Clic izquierdo/derecho para ajustar cantidades.
- 'Fila superior: Items de costo'
- 'Fila inferior: Items comprados'
trade-setup-desc-trading:
- Intercambia items con los jugadores.
- Toma un item de tu inventario
- y luego haz clic en una ranura para colocarlo.
- Clic izquierdo/derecho para ajustar cantidades.
- 'Fila superior: Items de resultado'
- 'Filas inferiores: Items de costo'
trade-setup-desc-book:
- Vende copias de libros.
- Inserta libros escritos y en blanco
- en el contenedor.
- Clic izquierdo/derecho para ajustar costos.
- 'Fila superior: Libros en venta'
- 'Filas inferiores: Items de costo'

