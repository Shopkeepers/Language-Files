shop-setup-desc-selling: |-
  &e  Añade los objetos que quieras vender a tu contenedor y luego
  &e  haz clic derecho en la tienda mientras estás agachado para modificar los costes.
shop-setup-desc-buying: |-
  &e  Añade una unidad de cada objeto que quieras comprar a tu contenedor y
  &e  luego haz clic derecho en la tienda mientras estás agachado para modificar los costes.
shop-setup-desc-trading: |-
  &e  Añade los objetos que quieras vender a tu contenedor y luego
  &e  haz clic derecho en la tienda mientras estás agachado para modificar los costes.
shop-setup-desc-book: |-
  &e  Añade libros escritos y libros pluma a tu contenedor y luego
  &e  haz clic derecho en la tienda mientras estás agachado para modificar los costes.
shop-setup-desc-admin-regular: |-
  &e  Haz clic derecho en la tienda mientras estás agachado para modificar los intercambios.

trade-setup-desc-header: '&6{shopType}'
trade-setup-desc-admin-regular:
- Tiene stock ilimitado.
- Inserta objetos desde tu inventario.
- 'Fila superior: Objetos resultantes'
- 'Filas inferiores: Objetos de coste'
trade-setup-desc-selling:
- Vende objetos a los jugadores.
- Inserta en el contenedor los objetos a vender.
- Click izquierdo/derecho para ajustar cantidades.
- 'Fila superior: Objetos en venta'
- 'Filas inferiores: Objetos de coste'
trade-setup-desc-buying:
- Compra objetos a los jugadores.
- Inserta en el contenedor una unidad de cada
- objeto que quieras comprar y suficiente divisa.
- Click izquierdo/derecho para ajustar cantidades.
- 'Fila superior: Objetos de coste'
- 'Fila inferior: Objetos que se compran'
trade-setup-desc-trading:
- Intercambia objetos con los jugadores.
- Recoge un objeto de tu inventario y
- haz clic en una ranura para colocarlo.
- Click izquierdo/derecho para ajustar cantidades.
- 'Fila superior: Objetos resultantes'
- 'Filas inferiores: Objetos de coste'
trade-setup-desc-book:
- Vende copias de libros.
- Inserta libros escritos y libros pluma
- en el contenedor.
- Click izquierdo/derecho para ajustar costes.
- 'Fila superior: Libros en venta'
- 'Filas inferiores: Objetos de coste'

